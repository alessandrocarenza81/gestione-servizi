<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestione Nulla Osta PA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="app-container">
        <header class="app-header">
            <div class="header-brand">
                <img src="loghi brand.png" alt="Loghi Brand" class="brand-logo">
                <div class="header-titles">
                    <h1>Gestione Nulla Osta PA</h1>
                    <p class="subtitle">Monitoraggio e stato delle richieste</p>
                </div>
            </div>
            <div style="display: flex; gap: 1rem; align-items: center;">
                <div id="sync-status" class="sync-status hidden">
                    <svg class="spinner" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <circle cx="12" cy="12" r="10" stroke-width="3" stroke="currentColor" stroke-opacity="0.2"></circle>
                        <path d="M12 2A10 10 0 0122 12" stroke-width="3" stroke-linecap="round"></path>
                    </svg>
                    Sincronizzazione...
                </div>
                <button id="btn-add-new" class="btn btn-primary">
                    <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                    </svg>
                    Nuovo Servizio
                </button>
            </div>
        </header>

        <section class="toolbar">
            <div class="search-box">
                <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                </svg>
                <input type="text" id="filter-search" placeholder="Cerca per ente...">
            </div>
            <div class="filter-box">
                <select id="filter-categoria">
                    <option value="all">Tutte le Categorie</option>
                    <option value="Comune">Comune</option>
                    <option value="Scuola">Scuola</option>
                    <option value="Altro">Altro</option>
                </select>
            </div>
            <div class="filter-box">
                <select id="filter-servizio">
                    <option value="all">Tutti i Servizi</option>
                    <option value="S.T.25">S.T.25</option>
                    <option value="S.F.08">S.F.08</option>
                </select>
            </div>
            <div class="filter-box">
                <select id="filter-status">
                    <option value="all">Tutti gli stati</option>
                    <option value="concluso">Concluso (SI)</option>
                    <option value="non-concluso">Non Concluso (NO)</option>
                </select>
            </div>
        </section>

        <main class="table-container">
            <div class="table-wrapper">
                <table id="data-table">
                    <thead>
                        <tr>
                            <th class="sortable" data-sort="ente">Ente Richiedente <span class="sort-icon"></span></th>
                            <th class="sortable" data-sort="categoria">Categoria <span class="sort-icon"></span></th>
                            <th class="sortable" data-sort="servizio">Servizio Richiesto <span class="sort-icon"></span></th>
                            <th class="sortable" data-sort="concluso">Servizio Concluso <span class="sort-icon"></span></th>
                            <th>Azioni</th>
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        <!-- Righe popolate via JavaScript -->
                    </tbody>
                </table>
            </div>
            <div id="empty-state" class="empty-state hidden">
                <svg width="48" height="48" fill="none" stroke="currentColor" viewBox="0 0 24 24" class="empty-icon">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4">
                    </path>
                </svg>
                <p>Nessun servizio trovato.</p>
            </div>
        </main>
    </div>

    <!-- Modale per Aggiunta/Modifica -->
    <div id="modal-overlay" class="modal-overlay hidden">
        <div class="modal">
            <div class="modal-header">
                <h2 id="modal-title">Aggiungi Servizio</h2>
                <button id="btn-close-modal" class="btn-icon">
                    <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12">
                        </path>
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <form id="service-form">
                    <input type="hidden" id="entry-id">
                    <div class="form-group">
                        <label for="ente">Ente Richiedente</label>
                        <input type="text" id="ente" required placeholder="Es. Comune di Milano">
                    </div>
                    <div class="form-group">
                        <label for="categoria">Categoria</label>
                        <select id="categoria" required>
                            <option value="" disabled selected>Seleziona categoria</option>
                            <option value="Comune">Comune</option>
                            <option value="Scuola">Scuola</option>
                            <option value="Altro">Altro</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Servizio Richiesto</label>
                        <div style="display: flex; gap: 1.5rem; margin-top: 0.5rem;">
                            <label class="custom-checkbox">
                                <input type="checkbox" id="srv-st25" value="S.T.25">
                                <span class="checkmark"></span>
                                S.T.25
                            </label>
                            <label class="custom-checkbox">
                                <input type="checkbox" id="srv-sf08" value="S.F.08">
                                <span class="checkmark"></span>
                                S.F.08
                            </label>
                        </div>
                        <p id="servizio-error"
                            style="color: #ef4444; font-size: 0.8rem; margin-top: 0.5rem; display: none;">Seleziona
                            almeno un servizio</p>
                    </div>
                    <div class="form-group checkbox-group">
                        <label class="custom-checkbox">
                            <input type="checkbox" id="concluso">
                            <span class="checkmark"></span>
                            Servizio Concluso
                        </label>
                    </div>
                    <div class="form-actions">
                        <button type="button" id="btn-cancel" class="btn btn-secondary">Annulla</button>
                        <button type="submit" class="btn btn-primary">Salva</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
